kind: "IdProvider"
mode: "MIXED"
form:
  - type: "TextLine"
    name: "authorizationUrl"
    label: "authorizationUrl"
    helpText: "https://www.example.com/adfs/oauth2/authorize"
    occurrences:
      min: 1
      max: 1
    default: "https://www.example.com/adfs/oauth2/authorize"
  - type: "TextLine"
    name: "tokenUrl"
    label: "tokenUrl"
    helpText: "https://www.example.com/adfs/oauth2/token"
    occurrences:
      min: 1
      max: 1
    default: "https://www.example.com/adfs/oauth2/token"
  - type: "TextLine"
    name: "logoutUrl"
    label: "logoutUrl"
    helpText: "https://www.example.com/adfs/ls/?wa=wsignout1.0&wreply="
    occurrences:
      min: 1
      max: 1
    default: "https://www.example.com/adfs/ls/?wa=wsignout1.0&wreply="
  - type: "TextLine"
    name: "clientId"
    label: "clientId"
    helpText: "Specifies a client identifier for this OAuth 2.0 client in AD FS."
    occurrences:
      min: 1
      max: 1
  - type: "TextLine"
    name: "resource"
    label: "resource"
    helpText: "The server resource server that the Client wants an access. By default the current protocol and hostname. Example: https://www.example.com"
    occurrences:
      min: 0
      max: 1
  - type: "ItemSet"
    name: "user"
    label: "User mappings"
    helpText: "Configure how data from the jwt.payload shall be used to create and update users."
    occurrences:
      min: 0
      max: 1
    items:
      - type: "TextLine"
        name: "name"
        label: "Name"
        helpText: "Needs to be unique."
        occurrences:
          min: 1
          max: 1
        default: "${objectSid}"
      - type: "TextLine"
        name: "displayName"
        label: "Display name"
        occurrences:
          min: 1
          max: 1
        default: "${given_name} ${family_name} <${upn}>"
      - type: "TextLine"
        name: "email"
        label: "Email"
        helpText: "You probably want to use ${upn} or ${email}"
        occurrences:
          min: 1
          max: 1
        default: "${upn}"
  - type: "CheckBox"
    name: "createAndUpdateGroupsOnLogin"
    label: "Create and update groups from dn"
    helpText: "Create and update groups when a user is logged in based on the dn value"
    occurrences:
      min: 0
      max: 1
  - type: "CheckBox"
    name: "createAndUpdateGroupsOnLoginFromGraphApi"
    label: "Create and update groups from graph api"
    helpText: "Create and update groups when a user is logged in based on groups returned from graph api"
    occurrences:
      min: 0
      max: 1
  - type: "TextLine"
    name: "graphApiUrl"
    label: "Graph API url"
    helpText: "https://graph.microsoft.com"
    occurrences:
      min: 1
      max: 1
    default: "https://graph.microsoft.com"
  - type: "CheckBox"
    name: "forceHttpsOnRedirectUri"
    label: "Force the redirect uri to use https"
    helpText: "If your enonic instance is running behind a SSL reverse proxy this might be necessary if you're not forwarding all http requests to https"
    occurrences:
      min: 0
      max: 1
  - type: "ItemSet"
    name: "proxy"
    label: "Proxy"
    helpText: "Configure a proxy to use when talking to AD FS (the Authorzation Server)"
    occurrences:
      min: 0
      max: 1
    items:
      - type: "TextLine"
        name: "host"
        label: "Host"
        helpText: "Proxy host name to use."
        occurrences:
          min: 1
          max: 1
      - type: "Long"
        name: "port"
        label: "Port Number"
        helpText: "Proxy port to use. Between 0 and 65535."
        occurrences:
          min: 0
          max: 1
        regexp: "^([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])$"
      - type: "TextLine"
        name: "user"
        label: "Username"
        helpText: "Username for proxy authentication."
        occurrences:
          min: 0
          max: 1
      - type: "TextLine"
        name: "password"
        label: "Password"
        helpText: "Password for proxy authentication."
        occurrences:
          min: 0
          max: 1
  - type: "ItemSet"
    name: "profile"
    label: "Property to user profile from AD FS JWT Claim"
    helpText: "Enrich user profile with data from AD FS."
    occurrences:
      min: 0
      max: 0
    items:
      - type: "TextLine"
        name: "from"
        label: "From jtw path"
        helpText: "Example: ${given_name} ${family_name} <${upn}>"
        occurrences:
          min: 1
          max: 1
      - type: "TextLine"
        name: "to"
        label: "To profile path"
        helpText: "Example: fullName"
        occurrences:
          min: 1
          max: 1
